services:
  # =========================================
  # 1. KAFKA SERVICE (ĐÃ KHÔI PHỤC)
  # =========================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xmx400M -Xms200M"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ddos_net
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic network-traffic --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic ddos-alerts --partitions 3 --replication-factor 1 --config cleanup.policy=compact
      "
    networks:
      - ddos_net
    restart: "no"

  # =========================================
  # 2. SPARK APP
  # =========================================
  spark-app:
    build:
      context: ./src/spark-app
    container_name: spark-app
    ports:
      - "4040:4040"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    user: root
    volumes:
      - ./src/spark-app:/app
      - ./src/spark-app/config:/app/config
      - ./data/processed:/data/processed
      - ./data/checkpoints:/data/checkpoints
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - INPUT_TOPIC=network-traffic
      - OUTPUT_TOPIC=ddos-alerts
      - SPARK_CHECKPOINT_DIR=/data/checkpoints/spark-job-v2
      - SHUFFLE_PARTITIONS=6
      - SPARK_MAX_OFFSETS_PER_TRIGGER=3000
      - SPARK_CHECK_CORRECTNESS_ENABLED=false
      - SPARK_FAIL_ON_DATA_LOSS=false
      - SPARK_TRIGGER_INTERVAL=2 seconds
      - SPARK_WATERMARK_DELAY=45 seconds
      - SPARK_ENABLE_FAST_WINDOW_RULES=false
      - SPARK_ENABLE_DISTRIBUTED_HEAVY_URL_RULE=true
      - SPARK_PROGRESS_LOG_INTERVAL_SECONDS=15
    command: >
      /opt/spark/bin/spark-submit 
      --master "local[*]" 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 
      main.py
    networks:
      - ddos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep org.apache.spark.deploy.SparkSubmit || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # =========================================
  # 3. PRODUCER
  # =========================================
  producer:
    build:
      context: ./src/producer
    container_name: traffic-generator
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - INPUT_TOPIC=${INPUT_TOPIC:-network-traffic}
      - SIMULATOR_BASE_RPS=${SIMULATOR_BASE_RPS:-120}
      - SIMULATOR_ATTACK_RATE_MULTIPLIER=${SIMULATOR_ATTACK_RATE_MULTIPLIER:-1.0}
      - SIMULATOR_NORMAL_BATCH_FACTOR=${SIMULATOR_NORMAL_BATCH_FACTOR:-0.1}
      - SIMULATOR_ATTACK_INTERVAL_MIN_SECONDS=${SIMULATOR_ATTACK_INTERVAL_MIN_SECONDS:-10}
      - SIMULATOR_ATTACK_INTERVAL_MAX_SECONDS=${SIMULATOR_ATTACK_INTERVAL_MAX_SECONDS:-20}
      - SIMULATOR_BOTNET_SELECTED_IPS=${SIMULATOR_BOTNET_SELECTED_IPS:-20}
    networks:
      - ddos_net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # =========================================
  # 4. ALERT SERVICE
  # =========================================
  alert-service:
    build:
      context: ./src/alerts
    container_name: alert-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - OUTPUT_TOPIC=ddos-alerts
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - ALERT_DEDUP_TTL_SECONDS=${ALERT_DEDUP_TTL_SECONDS:-300}
      - ALERT_MIN_SEVERITY=${ALERT_MIN_SEVERITY:-critical}
      - ALERT_STATS_INTERVAL_SECONDS=${ALERT_STATS_INTERVAL_SECONDS:-30}
    networks:
      - ddos_net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - ddos_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - es_data:/usr/share/elasticsearch/data
  
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - ddos_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  ddos_net:
    driver: bridge

volumes:
  kafka_data:
  es_data:
